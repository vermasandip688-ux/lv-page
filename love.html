<!DOCTYPE html>
<html>
<head>
    <title>I Miss You ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: 'Arial';
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white;
        }

        h1 {
            margin-top: 50px;
            font-size: 50px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px white; }
            to { text-shadow: 0 0 30px yellow; }
        }

        .photo {
            margin-top: 30px;
        }

        img {
            width: 300px;
            border-radius: 20px;
            box-shadow: 0 0 20px white;
        }

        .heart {
            font-size: 40px;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>💖 I Miss You 💖</h1>

    <div class="heart">❤️ ❤️ ❤️</div>

    <div class="photo">
        <!-- Yaha apni wife ki photo ka path daal -->
        <img src="wife.jpg" alt="My Love">
    </div>

    <h2>You are my everything ❤️</h2>

</body>
</html>
